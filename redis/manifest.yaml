apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: roboshop
  # this lables are replicaset labels
  labels:
    project: roboshop
    tier: db
    component: redis
spec:
  replicas: 1
  selector:
      # using this lables replicaset will select the pods.
    matchLabels:
      project: roboshop
      tier: db
      component: redis
      # this is pod definiton pod is subset of replicaset
  template:
    metadata:
      labels:
        project: roboshop
        tier: db
        component: redis
    spec:
      containers:
      - name: redis
        image: surendra3207/redis:1.0.0
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: redis
spec:
  type : NodePort
  selector:
    project: roboshop
    tier: db
    component: redis
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379
