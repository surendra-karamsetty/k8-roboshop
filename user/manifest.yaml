apiVersion: v1
kind: ConfigMap
metadata:
  name: user
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: user
data:
  MONGO: "true"
  REDIS_URL: "redis://redis:6379"
  MONGO_URL: "mongodb://mongodb:27017/users"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  namespace: roboshop
  # this lables are replicaset labels
  labels:
    project: roboshop
    tier: backend
    component: user
spec:
  replicas: 1
  selector:
      # using this lables replicaset will select the pods.
    matchLabels:
      project: roboshop
      tier: backend
      component: user
      # this is pod definiton pod is subset of replicaset
  template:
    metadata:
      labels:
        project: roboshop
        tier: backend
        component: user
    spec:
      containers:
      - name: user
        image: surendra3207/user:1.1.0
        imagePullPolicy: Always # safe to pull every time there may be images with same version rebuilt and push
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 2
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 2
        envFrom:
        - configMapRef:
            name: user

---
apiVersion: v1
kind: Service
metadata:
  name: user
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: user
spec:
  type : NodePort
  selector:
    project: roboshop
    tier: backend
    component: user
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
